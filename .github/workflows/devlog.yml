name: Nightly Devlog

on:
  schedule:
    - cron: "30 17 * * *" # 02:30 JST
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 (YYYY-MM-DD、省略で前日)"
        required: false

permissions:
  contents: write

concurrency:
  group: devlog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install anthropic playwright
          playwright install chromium --with-deps

      - name: Generate devlog assets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python devlog/scripts/generate.py ${{ inputs.date }}

      - name: Commit results
        run: |
          git config user.name "devlog-bot"
          git config user.email "actions@github.com"
          git add devlog/out devlog/latest.json
          git diff --cached --quiet || git commit -m "devlog: nightly assets"
          git push

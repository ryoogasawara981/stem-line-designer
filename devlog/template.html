<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STEM Devlog Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #faf7f2;
    color: #2b2622;
    position: relative;
  }
  .wrap {
    padding: 130px 90px 130px;
    height: 100%;
    display: flex; flex-direction: column;
  }
  /* top line: like a person's handwritten date note (no day-count badge) */
  .top { display: flex; align-items: baseline; gap: 22px; }
  .date { font-family: 'Zen Maru Gothic'; font-weight: 700; font-size: 42px; color: #a89f95; letter-spacing: 2px; }
  .kicker { margin-top: 14px; font-size: 30px; color: #8a8178; letter-spacing: 1px; }

  /* photo: dominant, slightly tilted like a snapshot.
     photo-wrap grows to fill whatever vertical space is left after the
     header/caption/memo/footer are laid out, so the layout never overflows
     the fixed 1920px canvas. The image is never cropped
     (object-fit: contain) — the uploaded screenshot is shown as-is. */
  .photo-wrap { margin-top: 70px; display: flex; justify-content: center; flex: 1 1 auto; min-height: 0; }
  .photo {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 24px 50px rgba(80,60,40,.14);
    transform: rotate(-1.4deg);
    padding: 26px 26px 34px;
    width: 860px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .photo img {
    width: 100%;
    flex: 1;
    min-height: 0;
    display: block;
    border-radius: 4px;
    object-fit: contain;
    object-position: center center;
  }

  /* caption: like a handwritten note under the photo */
  .caption {
    margin-top: 84px;
    font-family: 'Zen Maru Gothic';
    font-weight: 700;
    font-size: 60px;
    line-height: 1.5;
    color: #2b2622;
  }
  .memo {
    margin-top: 30px;
    font-size: 40px; line-height: 1.7;
    color: #6b625a;
    font-weight: 400;
  }

  .foot {
    margin-top: 40px;
    display: flex; align-items: center; gap: 18px;
    font-size: 28px; color: #a89f95;
  }
  .foot .dot { width: 14px; height: 14px; border-radius: 50%; background: #5E8CA7; }
  .foot b { color: #5E8CA7; font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="date">{{DATE}}</div>
    </div>
    <div class="kicker">アプリ、こつこつ作ってます</div>

    <div class="photo-wrap">
      <div class="photo">
        <img src="{{HERO_SRC}}">
      </div>
    </div>

    <div class="caption">{{CAPTION}}</div>
    <div class="memo">{{MEMO}}</div>

    <div class="foot">
      <span class="dot"></span>
      <span>STEM ・ ロングボードダンスの<b>ライン設計アプリ</b></span>
    </div>
  </div>

<script>
  const cap = document.querySelector('.caption');
  if (cap.textContent.length > 26) cap.style.fontSize = '48px';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STEM Devlog Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #faf7f2;
    color: #2b2622;
    position: relative;
  }
  .wrap {
    padding: 110px 90px 90px;
    height: 100%;
    display: flex; flex-direction: column;
  }
  /* top line: like a person's handwritten date note (no day-count badge) */
  .top { display: flex; align-items: baseline; gap: 22px; }
  .date { font-family: 'Zen Maru Gothic'; font-weight: 700; font-size: 40px; color: #a89f95; letter-spacing: 2px; }
  .kicker { margin-top: 12px; font-size: 30px; color: #8a8178; letter-spacing: 1px; }

  /* title: entered separately from the memo, so it never just repeats it.
     Placed above the photo so it reads like a headline. */
  .caption {
    margin-top: 44px;
    font-family: 'Zen Maru Gothic';
    font-weight: 700;
    font-size: 66px;
    line-height: 1.45;
    color: #2b2622;
  }

  /* photo: dominant, slightly tilted like a snapshot.
     photo-wrap grows to fill whatever vertical space is left after the
     header/title/memo are laid out (no footer anymore), so the layout
     never overflows the fixed 1920px canvas and the photo gets as much
     room as possible. The image is never cropped (object-fit: contain)
     — the uploaded screenshot is shown as-is, portrait phone shots included. */
  .photo-wrap { margin-top: 54px; display: flex; justify-content: center; flex: 1 1 auto; min-height: 0; }
  .photo {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 24px 50px rgba(80,60,40,.14);
    transform: rotate(-1.4deg);
    padding: 24px 24px 30px;
    width: 900px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .photo img {
    width: 100%;
    flex: 1;
    min-height: 0;
    display: block;
    border-radius: 4px;
    object-fit: contain;
    object-position: center center;
  }

  /* memo: body text, entered separately from the title */
  .memo {
    margin-top: 46px;
    font-size: 40px; line-height: 1.7;
    color: #6b625a;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="date">{{DATE}}</div>
    </div>
    <div class="kicker">ラインビルドアプリSTEMをこつこつ作ってます</div>

    <div class="caption">{{CAPTION}}</div>

    <div class="photo-wrap">
      <div class="photo">
        <img src="{{HERO_SRC}}">
      </div>
    </div>

    <div class="memo">{{MEMO}}</div>
  </div>

<script>
  const cap = document.querySelector('.caption');
  const len = cap.textContent.length;
  if (len > 34) cap.style.fontSize = '42px';
  else if (len > 22) cap.style.fontSize = '52px';

  const memoEl = document.querySelector('.memo');
  if (!memoEl.textContent.trim()) memoEl.style.display = 'none';
</script>
</body>
</html>

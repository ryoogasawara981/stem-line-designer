<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>STEM Devlog — 今朝の投稿</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Inter','Noto Sans JP',sans-serif;
    background:#10181e; color:#fff; min-height:100vh;
    padding:24px 20px 60px;
    background-image:radial-gradient(600px 400px at -10% -10%, rgba(94,140,167,.35), transparent),
                     radial-gradient(500px 400px at 110% 110%, rgba(224,102,60,.22), transparent);
  }
  h1 { font-size:22px; font-weight:900; letter-spacing:2px; }
  .sub { color:rgba(255,255,255,.5); font-size:13px; margin-top:4px; }
  .card {
    margin-top:20px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.15); border-radius:20px;
    padding:18px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  }
  .card h2 { font-size:14px; font-weight:900; letter-spacing:3px; color:#E0663C; margin-bottom:12px; }
  .card img { width:100%; border-radius:12px; display:block; }
  .hint { font-family:'Noto Sans JP'; font-size:12px; color:rgba(255,255,255,.5); margin-top:10px; }
  pre {
    font-family:'Noto Sans JP',sans-serif; white-space:pre-wrap;
    font-size:15px; line-height:1.7; color:rgba(255,255,255,.9);
  }
  button {
    margin-top:14px; width:100%; padding:14px; border:none; border-radius:12px;
    background:#E0663C; color:#fff; font-weight:900; font-size:15px;
    font-family:'Noto Sans JP'; cursor:pointer;
  }
  button.done { background:#3d8a5f; }
  .shots { display:flex; gap:10px; margin-top:4px; overflow-x:auto; }
  .shots img { height:160px; width:auto; border-radius:10px; }
  .empty { margin-top:40px; text-align:center; color:rgba(255,255,255,.5); font-family:'Noto Sans JP'; }
  a.link { color:#5E8CA7; }
</style>
</head>
<body>
  <h1>STEM DEVLOG <span id="day" style="color:#E0663C"></span></h1>
  <div class="sub" id="date"></div>
  <a href="add.html" style="display:block; margin-top:14px; padding:12px; text-align:center; border-radius:12px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:#fff; font-family:'Noto Sans JP'; font-size:13px; font-weight:700; text-decoration:none;">+ 今日の分を登録する</a>
  <div id="content" hidden>
    <div class="card">
      <h2>1. INSTAGRAM STORY</h2>
      <img id="story" alt="story">
      <div class="hint">画像を長押し →「写真に保存」→ インスタのストーリーに投稿</div>
    </div>
    <div class="card">
      <h2>2. THREADS 文章</h2>
      <pre id="threads"></pre>
      <button id="copy">文章をコピー</button>
    </div>
    <div class="card">
      <h2>3. THREADS 用スクショ</h2>
      <div class="shots" id="shots"></div>
      <div class="hint">長押しで保存して、文章と一緒にThreadsへ</div>
    </div>
  </div>
  <div class="empty" id="empty" hidden>まだ今日の生成データがありません</div>

<script>
(async () => {
  try {
    const r = await fetch('latest.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('day').textContent = 'Day ' + d.day_n;
    document.getElementById('date').textContent = d.date;
    document.getElementById('story').src = d.story + '?t=' + Date.now();
    document.getElementById('threads').textContent = d.threads_text;
    const shots = document.getElementById('shots');
    (d.screenshots || []).forEach(s => {
      const i = document.createElement('img'); i.src = s; shots.appendChild(i);
    });
    document.getElementById('content').hidden = false;
    const btn = document.getElementById('copy');
    btn.onclick = async () => {
      await navigator.clipboard.writeText(d.threads_text);
      btn.textContent = 'コピーしました ✓'; btn.classList.add('done');
      setTimeout(() => { btn.textContent = '文章をコピー'; btn.classList.remove('done'); }, 2000);
    };
  } catch (e) {
    document.getElementById('empty').hidden = false;
  }
})();
</script>
</body>
</html>
